<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DSR HOMES | Admin Dashboard</title>
    
    <!-- Favicon -->
    <link rel="icon" href="./logo_96x96.png" type="image/png">
    <link rel="apple-touch-icon" href="./logo_96x96.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: { DEFAULT: '#D4AF37', light: '#F3E5AB' },
                        dark: { 900: '#0a0a0a', 800: '#141414' }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        heading: ['Cinzel', 'serif']
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;600&display=swap');
        body { background-color: #0a0a0a; color: #ffffff; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>

    <!-- Browser Image Compression -->
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.1/dist/browser-image-compression.js"></script>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 relative">

    <div class="fixed inset-0 pointer-events-none bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-gold/10 via-dark-900 to-dark-900"></div>

    <!-- Login Section -->
    <div id="login-section" class="glass p-10 rounded-3xl shadow-2xl max-w-md w-full text-center relative z-10">
        <img src="./logo.png" alt="DSR Homes Logo" class="w-24 h-24 mx-auto mb-6">
        <h2 class="text-3xl font-heading font-bold mb-2">Admin Panel</h2>
        <p class="text-gray-400 mb-8">Sign in to manage projects</p>
        <button id="login-btn" class="w-full bg-white text-dark-900 font-bold py-3 px-4 rounded-xl hover:bg-gray-200 transition flex items-center justify-center gap-3">
            <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Sign in with Google
        </button>
        <div id="login-error" class="text-red-400 mt-4 hidden text-sm"></div>
    </div>

    <!-- Dashboard Section -->
    <div id="dashboard-section" class="hidden w-full max-w-5xl relative z-10">
        <div class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div class="flex items-center gap-4">
                <img src="./logo.png" alt="Logo" class="w-12 h-12">
                <h1 class="text-2xl font-heading font-bold text-gold">Project Manager</h1>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-email" class="text-gray-400 text-sm hidden md:block"></span>
                <button id="logout-btn" class="bg-red-500/10 text-red-400 border border-red-500/50 hover:bg-red-500 hover:text-white px-4 py-2 rounded-lg transition text-sm font-bold">Logout</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Upload Form -->
            <div class="glass p-6 md:p-8 rounded-2xl h-fit">
                <h2 id="form-header" class="text-xl font-bold mb-6">Add New Project</h2>
                <form id="upload-form" class="space-y-5">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Project Title</label>
                        <input type="text" id="project-title" required class="w-full bg-dark-900/80 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-gold">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Description (Optional)</label>
                        <textarea id="project-desc" rows="3" class="w-full bg-dark-900/80 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-gold placeholder-gray-600" placeholder="A brief description of this project..."></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Project Images (Up to 5)</label>
                        <input type="file" id="project-image" accept="image/*" multiple max="5" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-gold/10 file:text-gold hover:file:bg-gold/20">
                        <p id="image-hint" class="text-xs text-gray-500 mt-2">1st image will be the Cover. Max 5 images. Will be compressed to WebP.</p>
                    </div>
                    <div class="flex gap-2">
                        <button type="submit" id="submit-btn" class="w-full bg-gold text-dark-900 font-bold py-3 rounded-xl hover:shadow-[0_0_15px_rgba(212,175,55,0.5)] transition flex justify-center items-center">
                            Upload Project
                        </button>
                        <button type="button" id="cancel-edit-btn" class="hidden bg-gray-700 text-white font-bold py-3 px-4 rounded-xl hover:bg-gray-600 transition">
                            Cancel
                        </button>
                    </div>
                    <div id="upload-status" class="text-sm font-semibold mt-2 text-center"></div>
                </form>
            </div>

            <!-- Project List -->
            <div class="lg:col-span-2 glass p-6 md:p-8 rounded-2xl">
                <h2 class="text-xl font-bold mb-6">Manage Projects</h2>
                <div id="projects-list" class="grid grid-cols-1 sm:grid-cols-2 gap-4 max-h-[600px] overflow-y-auto pr-2 custom-scrollbar">
                    <div class="text-gray-400 italic">Loading projects...</div>
                </div>
            </div>

        </div>
    </div>

    <!-- Firebase & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, updateDoc, doc, serverTimestamp, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLr9kkI2XDiq6MhsQ9zZ80M7qk6guLf5g",
            authDomain: "dsrhomes-4ef5e.firebaseapp.com",
            projectId: "dsrhomes-4ef5e",
            storageBucket: "dsrhomes-4ef5e.firebasestorage.app",
            messagingSenderId: "571918175176",
            appId: "1:571918175176:web:09a30ab1429672d2664efd",
            measurementId: "G-DHHBWH9GS5"
        };

        const IMGBB_API_KEY = "88b74606aebd6c73762f4e87510bbdbc";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Elements
        const loginSection = document.getElementById('login-section');
        const dashboardSection = document.getElementById('dashboard-section');
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userEmailSpan = document.getElementById('user-email');
        const loginError = document.getElementById('login-error');
        const uploadForm = document.getElementById('upload-form');
        const formHeader = document.getElementById('form-header');
        const imageHint = document.getElementById('image-hint');
        const cancelEditBtn = document.getElementById('cancel-edit-btn');
        const submitBtn = document.getElementById('submit-btn');
        const uploadStatus = document.getElementById('upload-status');
        const projectsList = document.getElementById('projects-list');
        
        let editingProjectId = null;
        let existingImageUrl = null;
        let existingGalleryUrls = [];

        // Auth State Listener
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginSection.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
                userEmailSpan.textContent = user.email;
                loadProjects();
            } else {
                loginSection.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
            }
        });

        // Login
        loginBtn.addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();
            try {
                loginError.classList.add('hidden');
                await signInWithPopup(auth, provider);
            } catch (error) {
                loginError.textContent = "Error: " + error.message;
                loginError.classList.remove('hidden');
            }
        });

        // Logout
        logoutBtn.addEventListener('click', () => signOut(auth));

        // Cancel Edit
        cancelEditBtn.addEventListener('click', () => {
            editingProjectId = null;
            existingImageUrl = null;
            existingGalleryUrls = [];
            uploadForm.reset();
            formHeader.textContent = "Add New Project";
            submitBtn.textContent = "Upload Project";
            cancelEditBtn.classList.add('hidden');
            document.getElementById('project-image').required = true;
            imageHint.textContent = "1st image will be the Cover. Max 5 images. Will be compressed to WebP.";
        });

        // Upload or Update Project
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('project-title').value;
            const desc = document.getElementById('project-desc').value;
            const imageFiles = document.getElementById('project-image').files;

            if (!title) return;
            if (!editingProjectId && imageFiles.length === 0) {
                alert("Please select at least 1 image for the new project.");
                return;
            }
            if (imageFiles.length > 5) {
                alert("You can only select up to 5 images.");
                return;
            }

            try {
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
                uploadStatus.className = 'text-sm font-semibold mt-2 text-center text-gold';
                
                let imageUrl = existingImageUrl;
                let galleryUrls = existingGalleryUrls;

                if (imageFiles.length > 0) {
                    let uploadedUrls = [];
                    for (let i = 0; i < imageFiles.length; i++) {
                        uploadStatus.textContent = `Compressing image ${i + 1} of ${imageFiles.length}...`;
                        const options = {
                            maxSizeMB: 0.5,
                            maxWidthOrHeight: 1200,
                            useWebWorker: true,
                            fileType: 'image/webp'
                        };
                        const compressedFile = await imageCompression(imageFiles[i], options);

                        uploadStatus.textContent = `Uploading image ${i + 1} of ${imageFiles.length}...`;
                        const formData = new FormData();
                        formData.append('image', compressedFile);

                        const imgbbRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                            method: 'POST',
                            body: formData
                        });
                        const imgbbData = await imgbbRes.json();
                        if (!imgbbData.success) throw new Error("ImgBB Upload Failed for image " + (i+1));
                        
                        uploadedUrls.push(imgbbData.data.url);
                    }
                    imageUrl = uploadedUrls[0]; // 1st is cover
                    galleryUrls = uploadedUrls.slice(1); // rest is gallery
                }

                uploadStatus.textContent = "Saving to database...";

                if (editingProjectId) {
                    await updateDoc(doc(db, "projects", editingProjectId), {
                        title: title,
                        description: desc,
                        imageUrl: imageUrl,
                        galleryUrls: galleryUrls,
                        updatedAt: serverTimestamp()
                    });
                    uploadStatus.textContent = "Project updated successfully!";
                } else {
                    await addDoc(collection(db, "projects"), {
                        title: title,
                        description: desc,
                        imageUrl: imageUrl,
                        galleryUrls: galleryUrls,
                        createdAt: serverTimestamp()
                    });
                    uploadStatus.textContent = "Project added successfully!";
                }

                uploadStatus.className = 'text-sm font-semibold mt-2 text-center text-green-400';
                cancelEditBtn.click(); // resets the form and states
                loadProjects();

                setTimeout(() => uploadStatus.textContent = "", 3000);

            } catch (error) {
                console.error(error);
                uploadStatus.className = 'text-sm font-semibold mt-2 text-center text-red-400';
                uploadStatus.textContent = "Error: " + error.message;
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        });

        // Load Projects
        async function loadProjects() {
            try {
                projectsList.innerHTML = '<div class="text-gray-400 italic">Loading projects...</div>';
                const q = query(collection(db, "projects"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    projectsList.innerHTML = '<div class="text-gray-400 italic">No projects found.</div>';
                    return;
                }

                projectsList.innerHTML = '';
                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const div = document.createElement('div');
                    div.className = 'glass p-3 rounded-xl flex items-center gap-4 group';
                    div.innerHTML = `
                        <img src="${data.imageUrl}" class="w-16 h-16 rounded-lg object-cover" alt="${data.title}">
                        <div class="flex-1 min-w-0">
                            <h3 class="text-white font-bold truncate">${data.title}</h3>
                        </div>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button data-id="${docSnap.id}" class="edit-btn text-blue-400 hover:text-blue-300 p-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            </button>
                            <button data-id="${docSnap.id}" class="delete-btn text-red-400 hover:text-red-300 p-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            </button>
                        </div>
                    `;
                    projectsList.appendChild(div);
                });

                // Attach edit listeners
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        const id = e.currentTarget.getAttribute('data-id');
                        const docSnap = await getDoc(doc(db, "projects", id));
                        if (docSnap.exists()) {
                            const data = docSnap.data();
                            editingProjectId = id;
                            existingImageUrl = data.imageUrl;
                            existingGalleryUrls = data.galleryUrls || [];
                            
                            document.getElementById('project-title').value = data.title || "";
                            document.getElementById('project-desc').value = data.description || "";
                            document.getElementById('project-image').required = false;
                            
                            formHeader.textContent = "Edit Project";
                            submitBtn.textContent = "Update Project";
                            cancelEditBtn.classList.remove('hidden');
                            imageHint.textContent = "Leave empty to keep existing images. Uploading new images will replace ALL previous images.";
                            
                            window.scrollTo({top: 0, behavior: 'smooth'});
                        }
                    });
                });

                // Attach delete listeners
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async (e) => {
                        if (confirm("Are you sure you want to delete this project?")) {
                            const id = e.currentTarget.getAttribute('data-id');
                            await deleteDoc(doc(db, "projects", id));
                            loadProjects();
                        }
                    });
                });

            } catch (error) {
                console.error("Error loading projects:", error);
                projectsList.innerHTML = `<div class="text-red-400">Error loading projects. Ensure Firestore rules allow read/write.</div>`;
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(212,175,55,0.6); }
    </style>
</body>
</html>
