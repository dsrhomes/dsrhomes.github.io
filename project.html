                <h2 class="text-2xl font-heading text-gray-400">Loading Project Details...</h2>
            </div>

            <!-- Error State -->
            <div id="error" class="hidden text-center py-32">
                <h2 class="text-4xl font-heading font-bold text-red-500 mb-4">Project Not Found</h2>
                <p class="text-gray-400 mb-8">The project you are looking for might have been removed or the link is invalid.</p>
                <a href="index.html#projects" class="inline-block bg-gold text-dark-900 font-bold px-8 py-3 rounded-full hover:bg-white transition shadow-[0_0_20px_rgba(212,175,55,0.4)]">View All Projects</a>
            </div>

            <!-- Project Content -->
            <div id="project-content" class="hidden max-w-5xl mx-auto">
                <h1 id="p-title" class="text-4xl md:text-6xl font-heading font-black mb-6 leading-tight"></h1>
                <p id="p-desc" class="text-lg md:text-xl text-gray-400 mb-12 leading-relaxed max-w-3xl whitespace-pre-wrap"></p>
                
                <div class="rounded-3xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-gold/20 relative group cursor-pointer">
                    <img id="p-image" src="" alt="Project Image" class="w-full h-auto max-h-[80vh] object-cover transition duration-700 group-hover:scale-[1.02]">
                    <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition duration-300 flex items-center justify-center pointer-events-none">
                        <svg class="w-16 h-16 text-white opacity-0 group-hover:opacity-100 transition duration-300 drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                    </div>
                </div>
                
                <!-- Gallery Grid -->
                <div id="p-gallery" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 lg:grid-cols-4 gap-6 mt-12">
                    <!-- Dynamic gallery images go here -->
                </div>
                
                <div class="mt-16 text-center">
                    <a id="p-contact-btn" href="#" target="_blank" rel="noopener noreferrer" class="inline-block bg-gold text-dark-900 font-bold uppercase tracking-widest px-10 py-4 rounded-full hover:bg-white transition hover:shadow-[0_0_30px_rgba(212,175,55,0.6)] text-sm flex items-center justify-center gap-3 w-fit mx-auto">

                        </svg>
                        Request via WhatsApp
                    </a>
                </div>
            </div>

    <!-- Lightbox -->
    <div id="lightbox" class="fixed inset-0 z-[100] bg-black/95 hidden flex-col items-center justify-center p-4 opacity-0 transition-all duration-300 backdrop-blur-md">
        <button id="lightbox-close" class="absolute top-6 right-6 text-white hover:text-gold transition z-50 bg-black/50 p-2 rounded-full">

    <!-- Firebase Dynamic Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBLr9kkI2XDiq6MhsQ9zZ80M7qk6guLf5g",
            authDomain: "dsrhomes-4ef5e.firebaseapp.com",
            projectId: "dsrhomes-4ef5e",
            storageBucket: "dsrhomes-4ef5e.firebasestorage.app",
            messagingSenderId: "571918175176",
            appId: "1:571918175176:web:09a30ab1429672d2664efd"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Get Project ID from URL
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');

        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const contentDiv = document.getElementById('project-content');

        async function fetchProject() {
            if (!projectId) {
                showError();
                return;
            }

            try {
                const docRef = doc(db, "projects", projectId);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    document.title = `DSR HOMES | ${data.title}`;
                    document.getElementById('p-title').textContent = data.title;
                    document.getElementById('p-image').src = data.imageUrl;
                    document.getElementById('p-image').alt = `DSR Homes - ${data.title}`;
                    
                    // Dynamic WhatsApp Link
                    const waText = encodeURIComponent(`Hello DSR HOMES, I am interested in a design similar to '${data.title}'.`);
                    document.getElementById('p-contact-btn').href = `https://wa.me/94718445255?text=${waText}`;

                    const descEl = document.getElementById('p-desc');
                    if (data.description && data.description.trim() !== "") {
                        descEl.textContent = data.description;
                        descEl.classList.remove('hidden');
                    } else {
                        descEl.classList.add('hidden');
                    }

                    // Render Gallery
                    const galleryContainer = document.getElementById('p-gallery');
                    if (data.galleryUrls && data.galleryUrls.length > 0) {
                        let galleryHtml = '';
                        data.galleryUrls.forEach(url => {
                            galleryHtml += `
                            <div class="rounded-2xl overflow-hidden shadow-lg border border-gold/10 relative group cursor-pointer h-64 sm:h-80">
                                <img src="${url}" alt="Gallery Image" class="gallery-img w-full h-full object-cover transition duration-700 group-hover:scale-110">
                                <div class="absolute inset-0 bg-black/0 group-hover:bg-black/20 transition duration-300 flex items-center justify-center pointer-events-none">
                                    <svg class="w-10 h-10 text-white opacity-0 group-hover:opacity-100 transition duration-300 drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg>
                                </div>
                            </div>`;
                        });
                        galleryContainer.innerHTML = galleryHtml;
                        galleryContainer.classList.remove('hidden');
                    }

                    loadingDiv.classList.add('hidden');
                    contentDiv.classList.remove('hidden');
                    
                    setupLightbox();
                    
                    // Simple fade-in animation for content
                    contentDiv.animate([
                        { opacity: 0, transform: 'translateY(20px)' },
                        { opacity: 1, transform: 'translateY(0)' }
                    ], { duration: 800, easing: 'ease-out' });

                } else {
                    showError();
                }
            } catch (error) {
                console.error("Error fetching document:", error);
                showError();
            }
        }

        function showError() {
            loadingDiv.classList.add('hidden');
            errorDiv.classList.remove('hidden');
        }

        function setupLightbox() {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxClose = document.getElementById('lightbox-close');
            
            // Collect all clickable images (Hero + Gallery)
            const images = document.querySelectorAll('#p-image, .gallery-img');
            
            images.forEach(img => {
                // The click event should be on the container to be easier to click, but since the img covers it, clicking img works too. 
                // We actually made the parent group cursor-pointer. Let's attach to the parent.
                const parent = img.parentElement;
                parent.addEventListener('click', () => {
                    lightboxImg.src = img.src;
                    lightbox.classList.remove('hidden');
                    
                    // Small delay to allow display:flex to apply before animating opacity
                    requestAnimationFrame(() => {
                        lightbox.classList.remove('opacity-0');
                        lightboxImg.classList.remove('scale-95');
                        lightboxImg.classList.add('scale-100');
                    });
                });
            });

            function closeLightbox() {
                lightbox.classList.add('opacity-0');
                lightboxImg.classList.remove('scale-100');
                lightboxImg.classList.add('scale-95');
                setTimeout(() => {
                    lightbox.classList.add('hidden');
                    lightboxImg.src = '';
                }, 300);
            }

            lightboxClose.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !lightbox.classList.contains('hidden')) {
                    closeLightbox();
                }
            });
        }

        fetchProject();
    </script>
